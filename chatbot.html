<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Chatbot | Smart Farm Monitor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">
            <i class="fas fa-leaf"></i> SmartFarm
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="disease.html">Disease Detection</a></li>
            <li><a href="crop-advisor.html">Crop Advisor</a></li>
            <li><a href="chatbot.html" class="active">Farmer Chat</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 2rem;">Talk to Our Agricultural Advisor</h2>
        
        <div class="card" style="max-width: 600px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h3><i class="fas fa-robot"></i> Smart Agriculture Bot</h3>
            <div id="chatWindow" class="chat-window">
                <div class="message bot">Hello Farmer! I'm your Smart Agriculture Advisor. Ask me anything about crops, pests, fertilizers, or irrigation.</div>
            </div>
            
            <div id="typing" style="display: none; padding: 0.5rem; font-size: 0.8rem; color: var(--text-muted);">Bot is typing...</div>

            <form id="chatForm" style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <input type="text" id="userInput" placeholder="Type your message here..." style="flex: 1; padding: 0.8rem; border-radius: 8px; border: 1px solid #ddd; outline: none;" required>
                <button type="submit" style="padding: 0.8rem 2rem;">Send</button>
            </form>
            
            <div style="margin-top: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem;">
                <span style="font-size: 0.8rem; color: var(--text-muted); width: 100%;">Suggested Topics:</span>
                <button onclick="suggest('irrigation')" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; background: var(--accent); color: var(--secondary);">Best Irrigation</button>
                <button onclick="suggest('pest')" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; background: var(--accent); color: var(--secondary);">Pest Control</button>
                <button onclick="suggest('fertilizer')" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; background: var(--accent); color: var(--secondary);">Right Fertilizer</button>
                <button onclick="suggest('rice')" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; background: var(--accent); color: var(--secondary);">Rice Farming</button>
            </div>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatWindow = document.getElementById('chatWindow');
        const typing = document.getElementById('typing');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if(!message) return;

            addMessage(message, 'user');
            userInput.value = '';

            typing.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch('http://localhost:3000/api/chatbot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                
                setTimeout(() => {
                    typing.style.display = 'none';
                    addMessage(data.response, 'bot');
                }, 600);
            } catch (err) {
                console.error(err);
                typing.style.display = 'none';
                addMessage("I'm having trouble connecting. Make sure the server is running.", 'bot');
            }
        });

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function suggest(topic) {
            userInput.value = "Tell me about " + topic;
            chatForm.dispatchEvent(new Event('submit'));
        }
    </script>
</body>
</html>
